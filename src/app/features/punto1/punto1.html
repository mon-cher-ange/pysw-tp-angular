<section class="bg-body-secondary p-4" style="width: 600px">
  <h2 class="text-body-emphasis fw-bold pb-4">Eventos</h2>
  <div id="eventSlider" class="carousel slide">
    <div class="carousel-indicators">
      <button type="button" data-bs-target="#eventSlider" data-bs-slide-to="0" class="active" aria-current="true"
              aria-label="Slide 1"></button>
      <button type="button" data-bs-target="#eventSlider" data-bs-slide-to="1" aria-label="Slide 2"></button>
      <button type="button" data-bs-target="#eventSlider" data-bs-slide-to="2" aria-label="Slide 3"></button>
    </div>
    <div class="carousel-inner">
      @for (event of events; track $index) {
        <div class="carousel-item" [class.active]="$index === 0">
          <img [src]="event.image"
               class="d-block w-100"
               alt="Slider Placeholder Image">
          <div class="carousel-caption">
            <h5 class="fw-bold text-body-emphasis">{{ event.name }}</h5>
            <p class="text-body-secondary">{{ event.description }}</p>
          </div>
        </div>
      }
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#eventSlider" data-bs-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#eventSlider" data-bs-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Next</span>
    </button>
  </div>
</section>
