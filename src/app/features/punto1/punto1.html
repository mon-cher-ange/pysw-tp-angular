<section class="bg-body-secondary p-4" style="width: 600px">
  <h2 class="text-body-emphasis fw-bold pb-4">Eventos</h2>
  <article class="card text-center rounded-0 position-relative">
    <img [src]="events[currentPosition].image"
         class="d-block object-fit-cover rounded-0" alt="Slider {{ currentPosition + 1 }} Placeholder Image"
         style="height: 480px">
    <div class="card-body d-flex flex-column position-absolute bg-body bg-opacity-75 bottom-0 start-0 w-100 h-50" >
      <h5 class="card-title fw-bold text-body-emphasis">{{ events[currentPosition].name }}</h5>
      <p class="card-text text-body-secondary">{{ events[currentPosition].description }}</p>
      <div class="btn-group btn-group-sm mt-auto">
        <button class="btn btn-outline-dark border-0" (click)="previousPosition()"><i class="text-body fs-4 bi bi-arrow-left"></i></button>
        <button class="btn btn-outline-dark border-0" (click)="nextPosition()"><i class="text-body fs-4 bi bi-arrow-right"></i></button>
      </div>
    </div>
  </article>
</section>
